<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptogrömia Terminal</title>

<style>
    body {
        margin: 0;
        background-color: black;
        color: #00ff00;
        font-family: monospace;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    header {
        text-align: center;
        padding: 15px;
        border-bottom: 1px solid #00ff00;
        font-size: 18px;
    }

    #output {
        flex: 1;
        padding: 10px;
        overflow-y: auto;
        font-size: 16px;
    }

    .input-area {
        display: flex;
        border-top: 1px solid #00ff00;
    }

    input {
        flex: 1;
        padding: 15px;
        background: black;
        color: #00ff00;
        border: none;
        font-size: 16px;
    }

    button {
        background: #00ff00;
        color: black;
        border: none;
        padding: 15px;
        font-weight: bold;
        cursor: pointer;
    }

    button:active {
        background: #00cc00;
    }
</style>
</head>

<body>

<header>🕶️ Cryptogrömia Terminal</header>

<div id="output"></div>

<div class="input-area">
    <input type="text" id="input" placeholder="Digite aqui..." />
    <button onclick="traduzir()">OK</button>
</div>

<script>
const paraPortugues = {
    "xa":"A","br":"B","kr":"C","dr":"D","ze":"E",
    "fx":"F","gr":"G","hx":"H","zi":"I","jx":"J",
    "kx":"K","lx":"L","mx":"M","nx":"N","vo":"O",
    "px":"P","qx":"Q","rx":"R","sx":"S","tx":"T",
    "zu":"U","vx":"V","wx":"W","xx":"X","yx":"Y","zx":"Z"
};

const paraCrypto = {};
for (let key in paraPortugues) {
    paraCrypto[paraPortugues[key]] = key;
}

function traduzirParaPortugues(texto) {
    let resultado = "";
    for (let i = 0; i < texto.length; i += 2) {
        let parte = texto.substring(i, i + 2);
        resultado += paraPortugues[parte] || "?";
    }
    return resultado;
}

function traduzirParaCrypto(texto) {
    let resultado = "";
    texto = texto.toUpperCase();

    for (let letra of texto) {
        if (paraCrypto[letra]) {
            resultado += paraCrypto[letra];
        } else if (letra === " ") {
            resultado += " ";
        } else {
            resultado += "?";
        }
    }
    return resultado;
}

function ehCrypto(texto) {
    return /^[a-z]+$/.test(texto) && texto.length % 2 === 0;
}

function traduzir() {
    let input = document.getElementById("input");
    let texto = input.value.trim();
    if (!texto) return;

    let resultado = "";

    if (ehCrypto(texto)) {
        resultado = traduzirParaPortugues(texto.toLowerCase());
    } else {
        resultado = traduzirParaCrypto(texto);
    }

    let output = document.getElementById("output");
    output.innerText += "\n> " + texto + "\n" + resultado + "\n";

    input.value = "";
    output.scrollTop = output.scrollHeight;
}
</script>

</body>
</html>
