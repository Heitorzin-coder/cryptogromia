<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryptogrömia Terminal</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    text-align: center;
    padding: 15px;
    border-bottom: 1px solid #00ff00;
    font-size: 18px;
}

#output {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    font-size: 16px;
    white-space: pre-wrap;
}

.input-area {
    display: flex;
    flex-direction: column;
    border-top: 1px solid #00ff00;
}

input {
    padding: 15px;
    background: black;
    color: #00ff00;
    border: none;
    font-size: 16px;
    outline: none;
}

.buttons {
    display: flex;
}

button {
    flex: 1;
    padding: 15px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.btn-pt {
    background: #00ff00;
    color: black;
}

.btn-crypto {
    background: #003300;
    color: #00ff00;
}

button:active {
    opacity: 0.7;
}
</style>
</head>

<body>

<header>🕶️ Cryptogrömia Terminal</header>

<div id="output"></div>

<div class="input-area">
    <input type="text" id="input" placeholder="Digite aqui...">

    <div class="buttons">
        <button class="btn-pt" onclick="paraCrypto()">PT → CRYPTO</button>
        <button class="btn-crypto" onclick="paraPT()">CRYPTO → PT</button>
    </div>
</div>

<script>
function paraCrypto() {
    const tabela = {
        "A":"xa","B":"br","C":"kr","D":"dr","E":"ze",
        "F":"fx","G":"gr","H":"hx","I":"zi","J":"jx",
        "K":"kx","L":"lx","M":"mx","N":"nx","O":"vo",
        "P":"px","Q":"qx","R":"rx","S":"sx","T":"tx",
        "U":"zu","V":"vx","W":"wx","X":"xx","Y":"yx","Z":"zx"
    };

    let texto = document.getElementById("input").value.toUpperCase();
    let resultado = "";

    for (let letra of texto) {
        if (tabela[letra]) {
            resultado += tabela[letra];
        } else if (letra === " ") {
            resultado += " ";
        } else {
            resultado += "?";
        }
    }

    mostrar(texto, resultado);
}

function paraPT() {
    const tabela = {
        "xa":"A","br":"B","kr":"C","dr":"D","ze":"E",
        "fx":"F","gr":"G","hx":"H","zi":"I","jx":"J",
        "kx":"K","lx":"L","mx":"M","nx":"N","vo":"O",
        "px":"P","qx":"Q","rx":"R","sx":"S","tx":"T",
        "zu":"U","vx":"V","wx":"W","xx":"X","yx":"Y","zx":"Z"
    };

    let texto = document.getElementById("input").value.toLowerCase().replace(/\s/g, "");
    let resultado = "";

    for (let i = 0; i < texto.length; i += 2) {
        let parte = texto.substring(i, i + 2);
        resultado += tabela[parte] || "?";
    }

    mostrar(texto, resultado);
}

function mostrar(entrada, saida) {
    let output = document.getElementById("output");
    output.innerText += "\n> " + entrada + "\n" + saida + "\n";
}
</script>

</body>
</html>
